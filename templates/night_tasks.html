<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜间任务 - TimelineForClawd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin: 0 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-title {
            font-size: 18px;
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .task-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .task-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-content {
            flex: 1;
        }

        .task-content h4 {
            color: white;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .task-content p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .task-tag {
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.3);
            color: #667eea;
            border-radius: 20px;
            font-size: 12px;
        }

        .task-time {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }

        .task-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-confirmed {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
        }

        .status-pending {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa502;
        }

        .status-executed {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .execute-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .execute-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .execute-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }

        .empty-state a {
            color: #667eea;
            text-decoration: none;
        }

        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: #2ed573;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            display: none;
            z-index: 1000;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }

            .card {
                padding: 20px;
                border-radius: 15px;
            }

            .task-item {
                flex-wrap: wrap;
            }

            .task-meta {
                width: 100%;
                justify-content: space-between;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="message" id="message"></div>

    <div class="container">
        <div class="header">
            <h1>🌙 夜间任务</h1>
            <p>AI 根据你的任务进度生成的辅助建议</p>
        </div>

        <div class="nav-links">
            <a href="/">时间轴</a>
            <a href="/tasks">任务管理</a>
            <a href="/input">添加任务</a>
            <a href="/analysis">AI分析</a>
        </div>

        <div class="card">
            <div class="card-title">待处理任务</div>
            <div id="tasksList">
                <div class="empty-state">暂无夜间任务<br><a href="/analysis">运行AI分析生成</a></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">已确认任务</div>
            <div id="confirmedList">
                <div class="empty-state">暂无已确认任务</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">已执行记录</div>
            <div id="executedList">
                <div class="empty-state">暂无执行记录</div>
            </div>
        </div>
    </div>

    <script>
        async function loadNightTasks() {
            try {
                const response = await fetch('/api/night-tasks');
                const data = await response.json();

                const tasks = data.tasks || [];
                const pending = tasks.filter(t => !t.confirmed && !t.executed);
                const confirmed = tasks.filter(t => t.confirmed && !t.executed);
                const executed = tasks.filter(t => t.executed);

                // 待处理
                const pendingEl = document.getElementById('tasksList');
                if (pending.length === 0) {
                    pendingEl.innerHTML = '<div class="empty-state">暂无待处理任务 <a href="/analysis">去生成</a></div>';
                } else {
                    pendingEl.innerHTML = pending.map(task => `
                        <div class="task-item">
                            <input type="checkbox" onchange="confirmTask('${task.id}')">
                            <div class="task-content">
                                <h4>${task.description}</h4>
                                <p>关联任务: ${task.related_task}</p>
                            </div>
                            <div class="task-meta">
                                <span class="task-tag">${task.related_task}</span>
                                <span class="task-status status-pending">待确认</span>
                            </div>
                        </div>
                    `).join('');
                }

                // 已确认
                const confirmedEl = document.getElementById('confirmedList');
                if (confirmed.length === 0) {
                    confirmedEl.innerHTML = '<div class="empty-state">暂无已确认任务</div>';
                } else {
                    confirmedEl.innerHTML = confirmed.map(task => `
                        <div class="task-item">
                            <div class="task-content">
                                <h4>${task.description}</h4>
                                <p>关联任务: ${task.related_task}</p>
                            </div>
                            <div class="task-meta">
                                <span class="task-tag">${task.related_task}</span>
                                <span class="task-status status-confirmed">已确认</span>
                                <button class="execute-btn" onclick="executeTask('${task.id}')">执行</button>
                            </div>
                        </div>
                    `).join('');
                }

                // 已执行
                const executedEl = document.getElementById('executedList');
                if (executed.length === 0) {
                    executedEl.innerHTML = '<div class="empty-state">暂无执行记录</div>';
                } else {
                    executedEl.innerHTML = executed.map(task => `
                        <div class="task-item">
                            <div class="task-content">
                                <h4>${task.description}</h4>
                                <p>关联任务: ${task.related_task}</p>
                            </div>
                            <div class="task-meta">
                                <span class="task-tag">${task.related_task}</span>
                                <span class="task-status status-executed">✓ 已执行</span>
                            </div>
                        </div>
                    `).join('');
                }

            } catch (error) {
                console.error('加载夜间任务失败:', error);
            }
        }

        async function confirmTask(taskId) {
            try {
                await fetch(`/api/night-tasks/${taskId}/confirm`, { method: 'POST' });
                showMessage('任务已确认！');
                loadNightTasks();
            } catch (error) {
                alert('确认失败: ' + error.message);
            }
        }

        async function executeTask(taskId) {
            if (!confirm('确定要执行这个任务吗？')) return;

            try {
                // 这里可以调用实际的执行逻辑
                showMessage('任务执行中...');

                // 模拟执行（实际项目中调用Claude Code或OpenClaw）
                setTimeout(() => {
                    showMessage('任务执行完成！');
                    loadNightTasks();
                }, 1000);

            } catch (error) {
                alert('执行失败: ' + error.message);
            }
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }

        window.onload = loadNightTasks;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimelineForClawd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 头部卡片 */
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        /* 日期选择器区域 */
        .date-card {
            background: white;
            border-radius: 20px;
            padding: 25px 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .date-label {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        input[type="date"] {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="date"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 35px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        /* 统计区域 */
        .stats-card {
            background: white;
            border-radius: 20px;
            padding: 20px 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        /* 时间轴容器 */
        .timeline-card {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .timeline-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timeline-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        /* 时间轴项 */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e0e0e0;
        }

        .timeline-item {
            position: relative;
            padding: 18px 0;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        /* 时间轴圆点 */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 24px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            border: 3px solid #667eea;
        }

        .time {
            min-width: 60px;
            padding: 6px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            font-weight: 500;
            text-align: center;
        }

        .source {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            min-width: 90px;
            text-align: center;
        }

        .source-chrome { background: #E3F2FD; color: #1976D2; }
        .source-claude_code { background: #FCE4EC; color: #C2185B; }
        .source-phone_ocr { background: #E8F5E9; color: #388E3C; }

        .content {
            flex: 1;
        }

        .content h4 {
            margin-bottom: 6px;
            color: #1a1a2e;
            font-size: 15px;
            font-weight: 600;
        }

        .content p {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }

        .content .domain {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }

        /* 加载和错误状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 60px 20px;
            color: #e74c3c;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }

            .header, .date-card, .stats-card, .timeline-card {
                padding: 20px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .date-card {
                flex-direction: column;
            }

            .stats-card {
                gap: 20px;
            }

            .timeline-item {
                flex-wrap: wrap;
            }

            .time, .source {
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>TimelineForClawd</h1>
            <p>用户行为时间轴 - 记录你的数字生活轨迹</p>
        </div>

        <!-- 日期选择 -->
        <div class="date-card">
            <span class="date-label">选择日期</span>
            <input type="date" id="dateInput" value="2026-03-23">
            <button onclick="loadTimeline()">查询时间轴</button>
        </div>

        <!-- 统计 -->
        <div class="stats-card">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">-</div>
                <div class="stat-label">总记录数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="chromeCount">-</div>
                <div class="stat-label">Chrome</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="claudeCount">-</div>
                <div class="stat-label">Claude Code</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="phoneCount">-</div>
                <div class="stat-label">手机截屏</div>
            </div>
        </div>

        <!-- 时间轴 -->
        <div class="timeline-card">
            <div class="timeline-title">行为记录</div>
            <div class="timeline" id="timeline">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        function loadTimeline() {
            const dateInput = document.getElementById('dateInput').value;
            if (!dateInput) {
                alert('请选择日期');
                return;
            }

            const timelineEl = document.getElementById('timeline');
            timelineEl.innerHTML = '<div class="loading">加载中...</div>';

            // 转换日期格式
            const dateStr = dateInput.replace(/-/g, '.');

            fetch(`/api/timeline/${dateStr}`)
                .then(response => response.json())
                .then(data => {
                    // 更新统计
                    const counts = { chrome: 0, claude_code: 0, phone_ocr: 0 };
                    data.timeline.forEach(item => {
                        const source = item.source || item.source_type || 'unknown';
                        if (counts.hasOwnProperty(source)) {
                            counts[source]++;
                        }
                    });

                    document.getElementById('totalCount').textContent = data.count;
                    document.getElementById('chromeCount').textContent = counts.chrome;
                    document.getElementById('claudeCount').textContent = counts.claude_code;
                    document.getElementById('phoneCount').textContent = counts.phone_ocr;

                    // 渲染时间轴
                    if (data.timeline.length === 0) {
                        timelineEl.innerHTML = '<div class="empty">暂无数据</div>';
                        return;
                    }

                    let html = '';
                    data.timeline.forEach(item => {
                        const time = item.time ? item.time.substring(11, 16) : '';
                        const source = item.source || item.source_type || 'unknown';
                        const sourceClass = source.replace('_', '-');

                        let title = '';
                        let desc = '';
                        let domain = '';

                        if (source === 'chrome' && item.chrome) {
                            title = item.chrome.title || 'Chrome';
                            domain = item.chrome.domain || '';
                            desc = item.chrome.summary || '';
                        } else if (source === 'claude_code' && item.claude_code) {
                            title = item.claude_code.title || 'Claude Code';
                            desc = item.claude_code.content ?
                                item.claude_code.content.substring(0, 150).replace(/\n/g, ' ') : '';
                        } else if (source === 'phone_ocr' && item.phone_ocr) {
                            title = item.phone_ocr.title || '手机截屏';
                            desc = item.phone_ocr.text ?
                                item.phone_ocr.text.substring(0, 150).replace(/\n/g, ' ') : '';
                        } else {
                            title = source;
                            desc = JSON.stringify(item).substring(0, 100);
                        }

                        const sourceLabel = {
                            'chrome': 'Chrome',
                            'claude_code': 'Claude Code',
                            'phone_ocr': '手机截屏'
                        }[source] || source;

                        html += `
                            <div class="timeline-item">
                                <div class="time">${time}</div>
                                <div class="source source-${sourceClass}">${sourceLabel}</div>
                                <div class="content">
                                    <h4>${title}</h4>
                                    ${domain ? `<div class="domain">${domain}</div>` : ''}
                                    ${desc ? `<p>${desc}</p>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    timelineEl.innerHTML = html;
                })
                .catch(error => {
                    timelineEl.innerHTML = '<div class="error">加载失败: ' + error.message + '</div>';
                });
        }

        // 页面加载时自动加载
        window.onload = loadTimeline;
    </script>
</body>
</html>

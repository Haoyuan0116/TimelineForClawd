<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI分析 - TimelineForClawd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin: 0 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.3);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .analyze-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 30px;
        }

        .result-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .result-item h4 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-item p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .suggestion-item {
            background: #fff3cd;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ffc107;
        }

        .suggestion-item h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .suggestion-item p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-info {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .night-tasks-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
        }

        .night-tasks-link:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 行为分析</h1>
            <p>分析你的行为数据与任务的关联</p>
        </div>

        <div class="nav-links">
            <a href="/">时间轴</a>
            <a href="/tasks">任务管理</a>
            <a href="/input">添加任务</a>
            <a href="/analysis">AI分析</a>
        </div>

        <!-- 分析按钮 -->
        <div class="card">
            <div class="card-title">开始分析</div>
            <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">
                🔍 运行AI分析
            </button>
            <p style="text-align: center; color: #999; margin-top: 15px; font-size: 14px;">
                将根据你的任务配置，分析今日行为数据并生成夜间建议
            </p>
        </div>

        <!-- 分析结果 -->
        <div class="card" id="resultCard" style="display: none;">
            <div class="card-title">分析结果</div>
            <div id="analysisResult"></div>
            <div id="nightSuggestion"></div>
        </div>

        <!-- 当前状态 -->
        <div class="card">
            <div class="card-title">当前状态</div>
            <div class="status-info" id="statusInfo">加载中...</div>
        </div>
    </div>

    <script>
        let isAnalyzing = false;

        async function runAnalysis() {
            if (isAnalyzing) return;

            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading">分析中...</span>';
            isAnalyzing = true;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const result = await response.json();

                // 显示结果
                document.getElementById('resultCard').style.display = 'block';

                if (result.task_analysis && result.task_analysis.length > 0) {
                    let html = '<div class="result-section">';
                    result.task_analysis.forEach(item => {
                        html += `
                            <div class="result-item">
                                <h4>📋 ${item.task_name}</h4>
                                <p><strong>匹配行为:</strong> ${item.matched_count} 条</p>
                                <p><strong>进度估计:</strong> ${item.progress || '未知'}%</p>
                                <p><strong>分析:</strong> ${item.analysis || '暂无详细分析'}</p>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('analysisResult').innerHTML = html;
                } else {
                    document.getElementById('analysisResult').innerHTML = '<p>暂无分析结果</p>';
                }

                if (result.night_suggestions && result.night_suggestions.length > 0) {
                    let html = '<h3 style="margin: 20px 0 15px; color: #333;">🌙 夜间任务建议</h3>';
                    result.night_suggestions.forEach((item, index) => {
                        html += `
                            <div class="suggestion-item">
                                <h4>${index + 1}. ${item.description}</h4>
                                <p>关联任务: ${item.related_task}</p>
                                <p>建议执行时间: ${item.suggested_time || '夜间'}</p>
                            </div>
                        `;
                    });
                    html += '<a href="/night-tasks" class="night-tasks-link">前往夜间任务页面 →</a>';
                    document.getElementById('nightSuggestion').innerHTML = html;
                } else {
                    document.getElementById('nightSuggestion').innerHTML = '';
                }

                // 更新状态
                loadStatus();

            } catch (error) {
                alert('分析失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 运行AI分析';
                isAnalyzing = false;
            }
        }

        async function loadStatus() {
            try {
                const [tasksRes, behaviorsRes] = await Promise.all([
                    fetch('/api/tasks'),
                    fetch('/api/task-behaviors')
                ]);

                const tasks = await tasksRes.json();
                const behaviors = behaviorsRes.ok ? await behaviorsRes.json() : {};

                const allTasks = tasks.tasks || [];
                const inProgress = allTasks.filter(t => t.status === 'in_progress').length;

                let statusHtml = `<p>任务总数: ${allTasks.length} 个</p>`;
                statusHtml += `<p>进行中: ${inProgress} 个</p>`;

                document.getElementById('statusInfo').innerHTML = statusHtml;

            } catch (error) {
                console.error('加载状态失败:', error);
            }
        }

        window.onload = loadStatus;
    </script>
</body>
</html>
